<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes e Endereços</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Bloco com objetos do cadastro de cliente -->
        <header class="section cliente-section">
            <h2>Cadastro de Cliente</h2>
            <form id="clienteForm">
                <div class="form-row">
                    <div class="input-group full-width">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required placeholder="Nome completo">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="sexo">Sexo</label>
                        <select id="sexo" required>
                            <option value="">Selecione...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="idade">Idade</label>
                        <input type="number" id="idade" min="0" max="120" placeholder="Ex: 25" required>
                    </div>
                </div>

                <div class="actions-bar">
                    <button type="button" id="btnBuscarCliente" class="btn btn-info">Buscar Cliente</button>
                    <button type="button" id="btnCadastrarCliente" class="btn btn-success">Cadastrar Cliente</button>
                    <button type="button" id="btnAtualizarCliente" class="btn btn-warning" disabled>Atualizar Cliente</button>
                    <button type="button" id="btnDeletarCliente" class="btn btn-danger" disabled>Deletar Cliente</button>
                    <button type="button" id="btnCancelarCliente" class="btn btn-cancel" disabled>Cancelar</button>
                </div>
            </form>
        </header>

        <main class="section endereco-section">
            <h2>Endereços do Cliente Selecionado</h2>
            <form id="enderecoForm">

                <input type="hidden" id="enderecoId"> <!--Campo invisivel para armazenar o ID do endereco selecionado-->
                
                <div class="form-row">
                    <div class="input-group double-width">
                        <label for="logradouro">Logradouro</label>
                        <input type="text" id="logradouro" placeholder="Rua, Avenida, etc." disabled>
                    </div>
                    <div class="input-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Bairro" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group double-width">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" placeholder="Cidade" disabled>
                    </div>
                    <div class="input-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" maxlength="2" placeholder="UF" disabled>
                    </div>
                </div>

                <div class="actions-bar">
                    <button type="button" id="btnCadastrarEndereco" class="btn btn-success" disabled>Cadastrar Endereço</button>
                    <button type="button" id="btnAtualizarEndereco" class="btn btn-warning" disabled>Atualizar Endereço</button>
                    <button type="button" id="btnDeletarEndereco" class="btn btn-danger" disabled>Deletar Endereço</button>
                    <button type="button" id="btnCancelarEndereco" class="btn btn-cancel" disabled>Cancelar</button>
                </div>
            </form>

            <!-- Lista para apresentar endereços cadastrados para o cliente selecionado -->
            <div class="table-container">
                <table id="tabelaEnderecos">
                    <thead>
                        <tr>
                            <th>Logradouro</th>
                            <th>Bairro</th>
                            <th>Cidade</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Inserido dinamicamente via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
